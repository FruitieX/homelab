apiVersion: apps/v1
kind: Deployment
metadata:
  name: homectl
  namespace: default
  annotations:
    secret.reloader.stakater.com/reload: "homectl-server-env"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homectl
  template:
    metadata:
      labels:
        app: homectl
    spec:
      containers:
        - name: homectl
          image: ghcr.io/fruitiex/homectl:main@sha256:bbe795c9ecbba860331ba787a0635004a5b79a64c193ca9c520a301516d9a7cd
          envFrom:
            - secretRef:
                name: homectl-server-env
          env:
            - name: TZ
              value: Europe/Helsinki
            - name: RUST_LOG
              value: "homectl_server=info"
            - name: CONFIG_FILE
              value: /app/Settings.toml
            - name: HOMECTL_UI_DIST_DIR
              value: /app/ui/dist
          resources:
            limits:
              memory: 256Mi
              cpu: 500m
          ports:
            - name: http
              containerPort: 45289
          workingDir: /app

      initContainers:
        - name: wait-for-mqtt-broker
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until nc -z mqtt 1883; do echo waiting for mqtt broker; sleep 1; done",
            ]
