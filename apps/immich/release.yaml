apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: default
spec:
  interval: 99999h
  timeout: 5m
  chart:
    spec:
      chart: charts/immich
      sourceRef:
        kind: GitRepository
        name: immich
        namespace: flux-system
  values:
    # 1. Main Immich Server Configuration
    server:
      ingress:
        main:
          enabled: true
          ingressClassName: public
          annotations:
            external-dns.alpha.kubernetes.io/exclude: "true"
      controllers:
        main:
          containers:
            main:
              image:
                tag: v3.0.2
              env:
                REDIS_HOSTNAME: immich-valkey
                IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
                DB_DATABASE_NAME: immich
                DB_HOSTNAME: immich-postgres.fruitiex.org
                DB_PORT: "5432"
                DB_USERNAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-postgres-config
                      key: DB_USERNAME
                DB_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: immich-postgres-config
                      key: DB_PASSWORD
              envFrom:
                - secretRef:
                    name: immich-postgres-config
              volumeMounts:
                - name: media
                  mountPath: /usr/src/app/upload
          volumes:
            media:
              persistentVolumeClaim:
                claimName: pvc-immich-media

    # 2. Machine Learning Configuration
    machine-learning:
      controllers:
        main:
          containers:
            main:
              volumeMounts:
                - name: ml-cache
                  mountPath: /cache
          volumes:
            ml-cache:
              emptyDir: {}

    # 3. Valkey Cache Configuration
    valkey:
      enabled: true
      controllers:
        main:
          containers:
            main:
              image:
                repository: docker.io/valkey/valkey
                tag: 8.0-alpine
      persistence:
        data:
          enabled: true
          type: persistentVolumeClaim
          existingClaim: immich-valkey

    # 4. Core Immich Shared Persistence Settings
    immich:
      persistence:
        library:
          existingClaim: immich-library