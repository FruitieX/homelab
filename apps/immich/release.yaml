apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: default
spec:
  interval: 99999h
  timeout: 15m
  chart:
    spec:
      chart: immich
      version: 0.13.1
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
  upgrade:
    # v0.13 changes Deployment selectors, which Kubernetes cannot patch in place.
    force: true
  values:
    controllers:
      main:
        containers:
          main:
            image:
              tag: v3.0.2

    server:
      controllers:
        main:
          containers:
            main:
              env:
                DB_DATABASE_NAME: immich
                DB_HOSTNAME: immich-postgres.fruitiex.org
                DB_PORT: "5432"
                DB_USERNAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-postgres-config
                      key: DB_USERNAME
                DB_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: immich-postgres-config
                      key: DB_PASSWORD
              envFrom:
                - secretRef:
                    name: immich-postgres-config
      ingress:
        main:
          enabled: true
          className: public
          annotations:
            external-dns.alpha.kubernetes.io/exclude: "true"
      persistence:
        external:
          enabled: true
          existingClaim: pvc-immich-media

    valkey:
      enabled: true
      controllers:
        main:
          containers:
            main:
              image:
                repository: docker.io/valkey/valkey
                tag: 8.0-alpine

    immich:
      persistence:
        library:
          existingClaim: immich-library
  valuesFrom:
    - kind: Secret
      name: immich-secret-values
