apiVersion: apps/v1
kind: Deployment
metadata:
  name: ferrotune
  namespace: default
  annotations:
    secret.reloader.stakater.com/reload: "ferrotune-env"
spec:
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app: ferrotune
  template:
    metadata:
      labels:
        app: ferrotune
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      volumes:
        - name: ferrotune-music
          persistentVolumeClaim:
            claimName: pvc-ferrotune-music
        - name: ferrotune-data
          persistentVolumeClaim:
            claimName: ferrotune-data
        - name: ferrotune-transcodes
          emptyDir:
            sizeLimit: 20Gi
      containers:
        - name: ferrotune
          image: ghcr.io/fruitiex/ferrotune:main@sha256:7c0c1bb4203e033309fe6c58c9487db4fbc229246bcfa0cc74478c1b7ef6e4d8
          envFrom:
            - secretRef:
                name: ferrotune-env
          resources:
            limits:
              memory: 512Mi
              cpu: 1000m
          env:
            - name: TZ
              value: Europe/Helsinki
            - name: PORT
              value: "4040"
            - name: FERROTUNE_PORT
              value: "4040"
            - name: FERROTUNE_DB_MAX_CONNECTIONS
              value: "1"
            - name: FERROTUNE_DB_JOURNAL_MODE
              value: "delete"
            - name: FERROTUNE_DB_SYNCHRONOUS
              value: "normal"
            - name: FERROTUNE_DB_LOCKING_MODE
              value: "exclusive"
            - name: FERROTUNE_TRANSCODE_CACHE_PATH
              value: /cache/transcodes
            - name: FERROTUNE_TRANSCODE_CACHE_MAX_MB
              value: "20480"
            #- name: FERROTUNE_DB_BUSY_TIMEOUT
              #value: "1"
          volumeMounts:
            - mountPath: /music
              name: ferrotune-music
            - mountPath: /data
              name: ferrotune-data
            - mountPath: /cache/transcodes
              name: ferrotune-transcodes
